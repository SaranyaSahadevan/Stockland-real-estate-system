<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Listing – STOCKLAND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        /* ===== GLOBAL ===== */

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #eee;
            background: linear-gradient(120deg, #141824, #1f2a3d, #263a55, #1c2740, #141824);
            background-size: 400% 400%;
            animation: gradientFlow 16s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #fff;
            font-size: 30px;
            letter-spacing: 0.5px;
        }

        /* ===== NAVBAR ===== */

        .navbar {
            background: rgba(10, 12, 24, 0.9);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        .navbar .logo {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }

        .navbar nav a {
            display: inline-block;
            padding: 8px 14px;
            margin-left: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #f5f5f5;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            text-decoration: none;
            transition: 0.25s ease;
        }

        .navbar nav a:hover {
            background: #4a6cf7;
            color: #fff;
            transform: translateY(-2px);
        }

        /* ===== CARD ===== */

        .card {
            background: rgba(255,255,255,0.06);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
        }

        /* ===== FORM GRID ===== */

        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .full {
            grid-column: 1 / 3;
        }

        /* ===== INPUTS ===== */

        label {
            font-size: 14px;
            margin-bottom: 6px;
            display: block;
            color: #cfd8ff;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #555;
            background: rgba(0,0,0,0.35);
            color: #eee;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.25s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color: #9ca3c7;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 6px rgba(74,108,247,0.6);
            outline: none;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* ===== ERRORS ===== */

        .input-error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 4px;
        }

        /* ===== BUTTONS ===== */

        .btn-primary {
            background: #4a6cf7;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.25s ease;
        }

        .btn-primary:hover {
            background: #6c85ff;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.14);
            color: #eee;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.25s ease;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.26);
            color: #fff;
            transform: translateY(-2px);
        }

        .actions {
            grid-column: 1 / 3;
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        /* ===== FOOTER ===== */

        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: #b0b6d1;
            margin-top: 40px;
        }

        /* ===== RESPONSIVE ===== */

        @media (max-width: 700px) {
            form {
                grid-template-columns: 1fr;
            }
            .full {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo">STOCKLAND</div>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<div class="container">
    <h1>Create New Listing</h1>

    <div class="card">
        <form th:action="@{/properties/update}" th:object="${property}" method="post" enctype="multipart/form-data">

            <p th:if="${success}" th:text="${success}" class="flash-success"></p>

            <input type="hidden" th:field="*{id}">

            <div class="full">
                <label>Title</label>
                <input type="text" placeholder="Modern apartment in Riga center" th:field="*{title}">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="input-error"></p>
            </div>

            <div>
                <label>Location</label>
                <input type="text" placeholder="Latvia, Riga" th:field="*{location}">
                <p th:if="${#fields.hasErrors('location')}" th:errors="*{location}" class="input-error"></p>
            </div>
            <div>
                <label>Property Type</label>
                <select th:field="*{propertyType}">
                    <option value="">Select type</option>
                    <option th:each="t : ${propertyTypes}"
                            th:value="${t}"
                            th:text="${t}">
                    </option>
                </select>
                <p th:if="${#fields.hasErrors('propertyType')}" th:errors="*{propertyType}" class="input-error"></p>
            </div>

            <div>
                <label>Deal Type</label>
                <select th:field="*{actionType}">
                    <option value="">Select deal</option>
                    <option th:each="t : ${actions}"
                            th:value="${t}"
                            th:text="${t}">
                    </option>
                </select>
                <p th:if="${#fields.hasErrors('actionType')}" th:errors="*{actionType}" class="input-error"></p>
            </div>

            <div>
                <label>Price (€)</label>
                <input type="number" min="0" placeholder="150000" th:field="*{price}">
                <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="input-error"></p>
            </div>

            <div class="full">
                <label>Description</label>
                <textarea placeholder="Describe the property..." th:field="*{description}" ></textarea>

            </div>

            <div>
                <select th:field="*{status}">
                    <option value="">Select status</option>
                    <option value="OLD">OLD</option>
                    <option value="NEW">NEW</option>
                </select>
                <p th:if="${#fields.hasErrors('status')}" th:errors="*{status}" class="input-error"></p>
            </div>



            <div class="full">
                <label>Current Images (Check to delete)</label>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                    <div th:each="url : ${property.images}" style="position: relative; width: 100px;">
                        <img th:src="${url}" style="width: 100px; height: 75px; object-fit: cover; border-radius: 4px;">
                        <div style="text-align: center;">
                            <input type="checkbox" name="deleteImageIds" th:value="${url}">
                            <span style="font-size: 10px; color: red;">Delete</span>
                        </div>
                    </div>
                </div>

                <label>Add More Images</label>
                <input type="file" name="imageFiles" multiple accept="image/*">
            </div>

            <!--            <div class="full">-->
            <!--                <label>Contact Phone</label>-->
            <!--                <input type="text" placeholder="+371 ...">-->
            <!--            </div>-->

            <!--            <div class="full">-->
            <!--                <label>Contact Email</label>-->
            <!--                <input type="email" placeholder="agent@example.com">-->
            <!--            </div>-->
            <div class="actions">
                <button class="btn-primary" type="submit">Save changes</button>
                <button class="btn-secondary" onclick="window.location.href='dashboard.html'" type="reset">Cancel</button>
            </div>

        </form>

    </div>
</div>

<footer>
    STOCKLAND - Real Estate Property Listing & Management System
</footer>

</body>
</html>
