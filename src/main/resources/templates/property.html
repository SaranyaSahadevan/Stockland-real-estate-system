<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${property.title}">Property Details – STOCKLAND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css" rel="stylesheet">

    <style>
        :root {
            --brand-primary: #1f3c88;
            --brand-primary-dark: #162b5c;
            --brand-accent: #4a6cf7;
            --text-light: #ccc;
            --radius: 10px;
            --transition: 0.25s ease;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #eee;
            background: linear-gradient(120deg, #141824, #1f2a3d, #263a55, #1c2740, #141824);
            background-size: 400% 400%;
            animation: gradientFlow 16s ease infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .navbar {
            background: var(--brand-primary);
            color: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar .logo {
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .navbar nav a {
    display: inline-block;
    padding: 10px 18px;
    margin-left: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    text-decoration: none;
    transition: 0.25s ease;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
}

.navbar nav a:hover {
    background: #4a6cf7;
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
}

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .mini-navigation {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            padding: 8px 14px;
            background: rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #eee;
            font-size: 14px;
            text-decoration: none;
            transition: 0.25s ease;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.22);
        }

        .layout {
            display: flex;
            gap: 30px;
        }
        .layout section { flex: 3; }
        .layout aside { flex: 1.2; }

        #main-carousel img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: var(--radius);
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            display: block;
        }

        #thumbnail-carousel {
            margin-top: 10px;
        }

        #thumbnail-carousel .splide__slide {
            border: 2px solid transparent !important;
            border-radius: 6px;
            overflow: hidden;
            opacity: 0.6;
            transition: opacity var(--transition), border-color var(--transition);
            cursor: pointer;
        }
        #thumbnail-carousel .splide__slide.is-active {
            border-color: var(--brand-accent) !important;
            opacity: 1;
            box-shadow: 0 0 8px rgba(74, 108, 247, 0.6);
        }
        #thumbnail-carousel img {
            width: 100%;
            height: 60px;
            object-fit: cover;
            display: block;
            border: none;
        }

        .details {
            margin-top: 25px;
            background: rgba(255,255,255,0.06);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            backdrop-filter: blur(6px);
        }

        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .details-heart {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.12);
            transition: 0.25s ease;
        }
        .details-heart.heart-off { color: #bbb; }
        .details-heart.heart-off:hover { background: rgba(255,255,255,0.18); color: #eee; }
        .details-heart.heart-on {
            color: #ff4d4d;
            background: rgba(255,0,0,0.18);
            box-shadow: 0 0 10px rgba(255,0,0,0.4);
        }
        .details-heart.heart-on:hover { background: rgba(255,0,0,0.28); }

        .sidebar-card {
            background: rgba(255,255,255,0.06);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            backdrop-filter: blur(6px);
            margin-bottom: 20px;
        }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; }
        .badge-pending { background: #f1c40f; color: #000; }
        .badge-approved { background: #2ecc71; }
        .badge-rejected { background: #e74c3c; }

        .admin-actions-box {
            background: rgba(255,255,255,0.08);
            border-left: 4px solid #e67e22;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            backdrop-filter: blur(6px);
        }

        .admin-actions-box h3 {
            margin-top: 0;
            font-size: 18px;
            color: #e67e22;
        }

        .admin-btn {
            display: block;
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: 0.25s ease;
            box-sizing: border-box;
        }

        .admin-btn-edit  { background: #1f3c88; }
        .admin-btn-edit:hover  { background: #2a50b5; }

        .admin-btn-approve { background: #27ae60; }
        .admin-btn-approve:hover { background: #2ecc71; }

        .admin-btn-reject  { background: #d35400; }
        .admin-btn-reject:hover  { background: #e67e22; }

        .admin-btn-delete  { background: #922b21; }
        .admin-btn-delete:hover  { background: #c0392b; }

        .admin-actions-box form { margin-bottom: 0; }

        .admin-group-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.15);
            margin: 12px 0;
        }

.description {
white-space: pre-wrap;
word-wrap: break-word;
overflow-wrap: break-word;
max-width: 500px;
}

        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: #aaa;
            margin-top: 40px;
        }

        @media (max-width: 900px) {
            .layout { flex-direction: column; }
            #main-carousel img { height: 260px; }
        }

        .description {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 500px;
        }
    </style>
</head>

<body>

<header class="navbar">
    <div class="logo"><img th:src="@{/images/logo.png}" alt="Stockland" style="height:80px;vertical-align:middle;margin-top:-20px;margin-bottom:-20px;"></div>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<div class="container">

    <div class="mini-navigation">
        <a class="back-link" th:href="@{/listings}">← Back to listings</a>
    </div>

    <div class="layout">

        <!-- LEFT SIDE -->
        <section>

            <!-- MAIN CAROUSEL -->
            <section id="main-carousel" class="splide">
                <div class="splide__track">
                    <ul class="splide__list">

                        <th:block th:if="${property.images != null && property.images.length > 0}">
                            <li class="splide__slide" th:each="url : ${property.images}">
                                <img th:src="${url}">
                            </li>
                        </th:block>

                        <li class="splide__slide"
                            th:if="${property.images == null || property.images.length == 0}">
                            <img th:src="@{/images/placeholder_image.jpg}">
                        </li>

                    </ul>
                </div>
            </section>

            <!-- DETAILS -->
            <div class="details">

                <div class="details-header">
                    <h1 th:text="${property.title}">Property Title</h1>

                    <form th:action="@{/favorites/toggle/{id}(id=${property.id})}" method="post">
                        <button type="submit"
                                class="details-heart"
                                th:classappend="${isFavorite} ? 'heart-on' : 'heart-off'">
                            ♥
                        </button>
                    </form>
                </div>

                <div class="meta">
                    <span th:text="${property.location}"></span> •
                    <span th:text="${property.propertyType}"></span>
                </div>

                <div class="price">
                    <span th:text="${#numbers.formatDecimal(property.price, 1, 'WHITESPACE', 2, 'COMMA')}"></span> €
                </div>

                <div class="area"><span th:text="${property.area}"></span> m²</div>
                <div class="rooms">Rooms: <span th:text="${property.roomCount}"></span></div>

                <div class="description" th:text="${property.description}"></div>

            </div>

            <!-- THUMBNAILS -->
            <section id="thumbnail-carousel" class="splide">
                <div class="splide__track">
                    <ul class="splide__list">

                        <th:block th:if="${property.images != null && property.images.length > 0}">
                            <li class="splide__slide" th:each="url : ${property.images}">
                                <img th:src="${url}">
                            </li>
                        </th:block>

                        <li class="splide__slide"
                            th:if="${property.images == null || property.images.length == 0}">
                            <img th:src="@{/images/placeholder_image.jpg}">
                        </li>

                    </ul>
                </div>
            </section>

        </section>

        <!-- RIGHT SIDE -->
        <aside>

            <div class="sidebar-card">
                <h2>Contact agent</h2>
                <p>
                    <strong th:text="${user.username}"></strong><br>
                    <span th:text="${user.email}"></span><br>
                    <span th:if="${user.phoneNumber != null}">
                        <span th:text="${user.phoneNumber}"></span>
                    </span>
                </p>
            </div>

            <!-- USER ACTIONS (owner, non-admin) -->
            <div sec:authorize="isAuthenticated() and !hasRole('ADMIN')"
                 th:if="${#authentication.name == property.username}"
                 class="admin-actions-box">
                <h3>Your Listing</h3>
                <a th:href="${'/properties/edit/' + property.id + '?redirectUrl=/property/' + property.id}"
                   class="admin-btn admin-btn-edit">✏ Edit Listing</a>

                <hr class="admin-group-divider">

                <form th:action="@{/properties/delete/{id}(id=${property.id})}" method="post"
                      onsubmit="return confirm('Delete permanently? This cannot be undone.');">
                    <button type="submit" class="admin-btn admin-btn-delete">🗑 Delete Listing</button>
                </form>
            </div>

            <!-- ADMIN ACTIONS -->
            <div sec:authorize="hasRole('ADMIN')" class="admin-actions-box">
                <h3>Admin Actions</h3>

                <!-- Group 1: Edit -->
                <a th:href="${'/properties/edit/' + property.id + '?redirectUrl=/property/' + property.id}"
                   class="admin-btn admin-btn-edit">✏ Edit Listing</a>

                <hr class="admin-group-divider">

                <!-- Group 2: Moderation -->
                <form th:if="${property.moderationStatus?.name() != 'APPROVED'}"
                      th:action="@{/properties/approve/{id}(id=${property.id})}" method="post">
                    <input type="hidden" name="redirectUrl" th:value="'/property/' + ${property.id}">
                    <button type="submit" class="admin-btn admin-btn-approve">✔ Approve</button>
                </form>

                <form th:if="${property.moderationStatus?.name() != 'REJECTED'}"
                      th:action="@{/properties/reject/{id}(id=${property.id})}" method="post">
                    <input type="hidden" name="redirectUrl" th:value="'/property/' + ${property.id}">
                    <button type="submit" class="admin-btn admin-btn-reject">✖ Reject</button>
                </form>

                <hr class="admin-group-divider">

                <!-- Group 3: Danger zone -->
                <form th:action="@{/properties/delete/{id}(id=${property.id})}" method="post"
                      onsubmit="return confirm('Delete permanently?');">
                    <button type="submit" class="admin-btn admin-btn-delete">🗑 Delete Listing</button>
                </form>
            </div>

        </aside>

    </div>
</div>

<footer>
    STOCKLAND - Real Estate Property Listing & Management System
</footer>

<script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var main = new Splide('#main-carousel', {
            fixedHeight: 400,
            type: 'fade',
            rewind: true,
            pagination: false,
            arrows: true,
        });

        var thumbnails = new Splide('#thumbnail-carousel', {
            fixedWidth: 100,
            fixedHeight: 60,
            gap: 10,
            rewind: true,
            isNavigation: true,
            pagination: false,
            focus: 'center',
        });

        main.sync(thumbnails);
        main.mount();
        thumbnails.mount();
    });
</script>

<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
