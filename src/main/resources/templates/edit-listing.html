<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Listing – STOCKLAND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --brand-primary: #1f3c88;
            --brand-primary-dark: #162b5c;
            --brand-accent: #4a6cf7;
            --bg-light: #f5f5f5;
            --bg-white: #ffffff;
            --text-dark: #222;
            --text-light: #666;
            --radius: 8px;
            --shadow: 0 2px 6px rgba(0,0,0,0.08);
            --transition: 0.25s ease;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
        }

        a { color: var(--brand-primary); text-decoration: none; transition: var(--transition); }
        a:hover { color: var(--brand-accent); }

        .navbar {
            background: var(--brand-primary);
            color: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .navbar nav a { color: #fff; margin-left: 18px; font-size: 14px; }
        .navbar nav a:hover { color: #dfe6ff; }

        @media (max-width: 700px) {
            .navbar { flex-direction: column; align-items: flex-start; }
            .navbar nav { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
        }

        .container {
            max-width: 900px;
            margin: 25px auto;
            padding: 0 15px;
        }

        h1 { margin-top: 0; font-size: 26px; }

        .card {
            background: var(--bg-white);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        form .full { grid-column: 1 / -1; }

        label { display: block; margin-bottom: 4px; font-size: 14px; }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: var(--radius);
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea { resize: vertical; min-height: 100px; }

        .actions { margin-top: 20px; }

        .btn-primary {
            padding: 10px 18px;
            background: var(--brand-primary);
            color: #fff;
            border-radius: var(--radius);
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary:hover { background: var(--brand-primary-dark); }

        .btn-secondary {
            padding: 10px 18px;
            background: #ddd;
            color: #333;
            border-radius: var(--radius);
            font-size: 15px;
            border: none;
            cursor: pointer;
            margin-left: 10px;
        }

        .btn-secondary:hover { background: #ccc; }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: var(--text-light);
            margin-top: 40px;
        }

        @media (max-width: 700px) {
            form { grid-template-columns: 1fr; }
        }

        .input-error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo">STOCKLAND</div>
    <div th:replace="fragments/navbar :: navbar"></div>
</header>

<div class="container">
    <h1>Edit Listing</h1>

    <div class="card">
        <form id="propertyForm"
              th:action="@{/properties/edit/{id}(id=${propertyRequestDTO.id})}"
              th:object="${propertyRequestDTO}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" name="redirectUrl" th:value="${redirectUrl}">

            <input type="hidden" th:field="*{id}">

            <div class="full">
                <label>Title</label>
                <input type="text" placeholder="Modern apartment in Riga center" th:field="*{title}">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="input-error"></p>
            </div>

            <div>
                <label>Location</label>
                <input type="text" placeholder="Latvia, Riga" th:field="*{location}">
                <p th:if="${#fields.hasErrors('location')}" th:errors="*{location}" class="input-error"></p>
            </div>

            <div>
                <label>Property Type</label>
                <select th:field="*{propertyType}">
                    <option value="">Select type</option>
                    <option th:each="t : ${propertyTypes}"
                            th:value="${t}"
                            th:text="${t}">
                    </option>
                </select>
                <p th:if="${#fields.hasErrors('propertyType')}" th:errors="*{propertyType}" class="input-error"></p>
            </div>

            <div>
                <label>Deal Type</label>
                <select th:field="*{actionType}">
                    <option value="">Select deal</option>
                    <option th:each="t : ${actions}"
                            th:value="${t}"
                            th:text="${t}">
                    </option>
                </select>
                <p th:if="${#fields.hasErrors('actionType')}" th:errors="*{actionType}" class="input-error"></p>
            </div>

            <div>
                <label>Price (€)</label>
                <input type="text"
                       pattern="^\d{1,12}(,\d{1,2})?$"
                       placeholder="150000,00"
                       title="Use comma as decimal separator, max 2 decimal digits (e.g. 150000,99)"
                       oninvalid="this.setCustomValidity('Please use format: 1234,99 – comma as decimal separator, max 2 digits after comma')"
                       oninput="this.setCustomValidity('')"
                       th:field="*{price}">
                <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="input-error"></p>
            </div>

            <div>
                <label>Area (m²)</label>
                <input type="number" min="0" placeholder="100.00" th:field="*{area}">
                <p th:if="${#fields.hasErrors('area')}" th:errors="*{area}" class="input-error"></p>
            </div>

            <div>
                <label>Rooms</label>
                <input type="number" min="0" placeholder="1" th:field="*{roomCount}">
                <p th:if="${#fields.hasErrors('roomCount')}" th:errors="*{roomCount}" class="input-error"></p>
            </div>

            <div>
                <label>Status</label>
                <select th:field="*{status}">
                    <option value="">Select status</option>
                    <option value="OLD">OLD</option>
                    <option value="NEW">NEW</option>
                </select>
                <p th:if="${#fields.hasErrors('status')}" th:errors="*{status}" class="input-error"></p>
            </div>

            <div class="full">
                <label>Description</label>
                <textarea placeholder="Describe the property..." th:field="*{description}"></textarea>
            </div>


            <div class="full">
                <label>Current Images (Check to delete)</label>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                    <div th:each="url : ${images}" style="position: relative; width: 100px;">
                        <img th:src="${url}" style="width: 100px; height: 75px; object-fit: cover; border-radius: 4px;">
                        <div style="text-align: center;">
                            <input type="checkbox" name="deleteImageIds" th:value="${url}">
                            <span style="font-size: 10px; color: red;">Delete</span>
                        </div>
                    </div>
                </div>

                <label>Add More Images</label>
                <input type="file" name="imageFiles" multiple accept="image/*">
                <p th:if="${errorMessage}" th:text="${errorMessage}" class="input-error"></p>
            </div>

            <div class="actions full">
                <button class="btn-primary" type="submit">Save Changes</button>
                <a th:href="${redirectUrl != null ? redirectUrl : '/dashboard'}" class="btn-secondary" style="display:inline-block; text-decoration:none;">
                    Cancel
                </a>
            </div>

        </form>
    </div>
</div>

<footer>
    STOCKLAND - Real Estate Property Listing & Management System
</footer>

<div th:replace="~{fragments/chatbot :: chatbot}"></div>

<script>
    const myForm = document.getElementById('propertyForm');

    if (myForm) {
        myForm.addEventListener('submit', function(e) {
            console.log("Validation script triggered!");

            const fileInput = document.querySelector('input[name="imageFiles"]');
            const maxFiles = 20;

            if (fileInput && fileInput.files.length > maxFiles) {
                alert("Too many files! Max allowed: " + maxFiles);
                e.preventDefault();
                return false;
            }

            let totalSize = 0;
            for (let i = 0; i < fileInput.files.length; i++) {
                totalSize += fileInput.files[i].size;
            }

            if (totalSize > 50 * 1024 * 1024) {
                alert("Total file size exceeds storage limit.");
                e.preventDefault();
                return false;
            }
        });
    } else {
        console.error("Could not find propertyForm ID!");
    }
</script>
</body>
</html>
