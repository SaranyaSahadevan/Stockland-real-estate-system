<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Listing – STOCKLAND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --brand-primary: #1f3c88;
            --brand-primary-dark: #162b5c;
            --brand-accent: #4a6cf7;
            --bg-light: #f5f5f5;
            --bg-white: #ffffff;
            --text-dark: #222;
            --text-light: #666;
            --radius: 8px;
            --shadow: 0 2px 6px rgba(0,0,0,0.08);
            --transition: 0.25s ease;
        }

        body { margin:0; font-family: Arial, sans-serif; background: var(--bg-light); color: var(--text-dark); }
        a { color: var(--brand-primary); text-decoration:none; transition: var(--transition); }
        a:hover { color: var(--brand-accent); }

        .navbar { background: var(--brand-primary); color:#fff; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
        .navbar .logo { font-size:22px; font-weight:bold; letter-spacing:1px; }
        .navbar nav a { color:#fff; margin-left:18px; font-size:14px; }
        .navbar nav a:hover { color:#dfe6ff; }

        @media (max-width:700px){
            .navbar { flex-direction:column; align-items:flex-start; }
            .navbar nav { margin-top:10px; display:flex; flex-wrap:wrap; gap:10px; }
        }

        .container { max-width:900px; margin:25px auto; padding:0 15px;}
        h1 { margin-top:0; font-size:26px; }

        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
        .card {
            background: var(--bg-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card-img {
            flex: 1;
            height: 200px;
            background: #d0d6ff;
        }
        .card-body {
            flex: 1;
            padding: 15px;
        }
        .card-body h3 { margin: 0 0 6px; font-size: 16px; }
        .card-body p { margin: 3px 0; color: var(--text-light); font-size: 13px; }

        .card-footer {
            padding: 10px 15px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-top: 1px solid #eee;
        }
        .card-footer a { padding: 6px 10px; background: var(--brand-primary); color: #fff; border-radius: 4px; font-size: 13px; }
        .card-footer a:hover { background: var(--brand-primary-dark); }

        form { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
        form .full { grid-column:1 / -1; }

        label { display:block; margin-bottom:4px; font-size:14px; }
        input, select, textarea { width:100%; padding:10px; border-radius: var(--radius); border:1px solid #ccc; box-sizing:border-box; font-size:14px; }
        textarea { resize: vertical; min-height:100px; }

        .actions { margin-top:20px; }
        .btn-primary { padding:10px 18px; background: var(--brand-primary); color:#fff; border-radius: var(--radius); font-size:15px; border:none; cursor:pointer; transition: var(--transition); }
        .btn-primary:hover { background: var(--brand-primary-dark); }

        .btn-secondary { padding:10px 18px; background:#ddd; color:#333; border-radius: var(--radius); font-size:15px; border:none; cursor:pointer; margin-left:10px; }
        .btn-secondary:hover { background:#ccc; }

        footer { text-align:center; padding:20px; font-size:13px; color: var(--text-light); margin-top:40px; }

        @media (max-width:700px){ form { grid-template-columns:1fr; } }

        .hero {
            background: var(--bg-white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }

        .filter-box{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            align-items: end;
        }

        .filter-box button {
            background: var(--brand-primary);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
        }

        h2.section-title { margin: 20px 0 10px; font-size: 20px; }
        .filter-sections{
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo">STOCKLAND</div>
    <div th:replace="fragments/navbar :: navbar"></div>
</header>

<div class="container">
    <section class="hero">
        <form th:action="@{/listings}" method="get" class="filter-box">
            <div class="filter-sections">
                <label>Location</label>
                <input type="text" name="location" placeholder="location" th:value="${filters.location}">
            </div>
            <div class="filter-sections">
                <label>Min. Price</label>
                <input type="number" name="minPrice" placeholder="min. price" th:value="${filters.minPrice}">
            </div>
            <div class="filter-sections">
                <label >Max. Price</label>
                <input type="number" name="maxPrice" placeholder="max. price" th:value="${filters.maxPrice}">
            </div>
            <div class="filter-sections">
                <label>Deal type</label>
                <select name="actionType">
                    <option value="">-</option>
                    <option th:each="a : ${actions}"
                            th:value="${a}"
                            th:text="${a}"
                            th:selected="${a == filters.actionType}">
                    </option>
                </select>
            </div>
            <div class="filter-sections">
                <label>Property type</label>
                <select name="propertyType">
                    <option value="">-</option>
                    <option th:each="p : ${propertyTypes}"
                            th:value="${p}"
                            th:text="${p}"
                            th:selected="${p == filters.propertyType}">
                    </option>
                </select>
            </div>
            <div class="filter-sections">
                <label>Status</label>
                <select name="status">
                    <option value="">-</option>
                    <option th:value="OLD" th:text="OLD" th:selected="${filters.status == 'OLD'}"></option>
                    <option th:value="NEW" th:text="NEW" th:selected="${filters.status == 'NEW'}"></option>
                </select>
            </div>
            <div class="filter-sections">
                <label>Min. Area</label>
                <input type="number" name="minArea" placeholder="min. area" th:value="${filters.minArea}">
            </div>
            <div class="filter-sections">
                <label >Max. Area</label>
                <input type="number" name="maxArea" placeholder="max. area" th:value="${filters.maxArea}">
            </div>
            <div class="filter-sections">
                <label>Min. Rooms</label>
                <input type="number" name="minRooms" placeholder="min. rooms" th:value="${filters.minRooms}">
            </div>
            <div class="filter-sections">
                <label >Max. Rooms</label>
                <input type="number" name="maxRooms" placeholder="max. rooms" th:value="${filters.maxRooms}">
            </div>
            <div class="filter-sections">
                <label>Sort</label>
                <select id="sort" name="sort">
                    <option value="">-</option>
                    <option value="price,asc">Price: Low to High</option>
                    <option value="price,desc">Price: High to Low</option>
                </select>
            </div>
            <button type="submit">Search</button>
        </form>
        <div class="sort-error-box">
            <div th:if="${errorMessage}">
                <span th:text="${errorMessage}"></span>
            </div>
        </div>
    </section>

    <h2 class="section-title">Searched listings</h2>

    <div class="cards">
        <article class="card" th:each="p : ${properties}">
            <div class="card-img">
                <img th:src="${p.images != null && p.images.length > 0 ? p.images[0] : '/images/placeholder_image.jpg'}"
                     alt="Property Preview"
                     style="width:100%; height:200px; object-fit:cover;">
            </div>
            <div class="card-body">
                <h3 th:text="${p.title}">Property title</h3>
                <p th:text="${p.location}">location</p>
                <p th:text="${p.propertyType}">Type</p>
                <p th:text="${p.actionType}">Action</p>
                <p th:text="${p.price}">€0</p>
                <p th:text="${p.status}">status</p>
                <p th:text="${p.description}">description</p>
            </div>
            <div class="card-footer">
                <a th:href="@{/property/{id}(id=${p.id})}">View</a>
            </div>
        </article>

        <p th:if="${properties == null or properties.isEmpty()}">
            No listings found matching your search.
        </p>
    </div>

    <div class="pagination-container" th:if="${propertyPage.totalPages > 1}">
        <ul style="display: flex; list-style: none; gap: 10px;">

            <li th:if="${propertyPage.hasPrevious()}">
                <a th:href="@{/listings(page=${propertyPage.number - 1},
                location=${filters.location},
                minPrice=${filters.minPrice},
                maxPrice=${filters.maxPrice},
                actionType=${filters.actionType},
                propertyType=${filters.propertyType},
                maxArea=${filters.maxArea},
                minArea=${filters.minArea},
                maxRooms=${filters.maxRooms},
                minRooms=${filters.minRooms},
                status=${filters.status}
                )}">Previous</a>
            </li>

            <li th:each="i : ${#numbers.sequence(0, propertyPage.totalPages - 1)}">
                <a th:href="@{/listings(page=${i},
                location=${filters.location},
                minPrice=${filters.minPrice},
                maxPrice=${filters.maxPrice},
                actionType=${filters.actionType},
                propertyType=${filters.propertyType},
                maxArea=${filters.maxArea},
                minArea=${filters.minArea},
                maxRooms=${filters.maxRooms},
                minRooms=${filters.minRooms},
                status=${filters.status}
                )}"
                   th:text="${i + 1}"
                   th:style="${i == propertyPage.number} ? 'font-weight:bold; color:red;' : ''">1</a>
            </li>

            <li th:if="${propertyPage.hasNext()}">
                <a th:href="@{/listings(page=${propertyPage.number + 1},
                location=${filters.location},
                minPrice=${filters.minPrice},
                maxPrice=${filters.maxPrice},
                actionType=${filters.actionType},
                propertyType=${filters.propertyType},
                maxArea=${filters.maxArea},
                minArea=${filters.minArea},
                maxRooms=${filters.maxRooms},
                minRooms=${filters.minRooms},
                status=${filters.status}
                )}">Next</a>
            </li>
        </ul>
    </div>

</div>

<footer>
    STOCKLAND - Real Estate Property Listing & Management System
</footer>

<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
