<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – STOCKLAND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
      --brand-primary: #1f3c88;
      --brand-primary-dark: #162b5c;
      --brand-accent: #4a6cf7;
      --text-light: #ccc;
      --radius: 8px;
      --transition: 0.25s ease;
  }

  /* BACKGROUND LIKE INDEX.HTML */
  body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #eee;

      background: linear-gradient(120deg,
          #141824,
          #1f2a3d,
          #263a55,
          #1c2740,
          #141824
      );
      background-size: 400% 400%;
      animation: gradientFlow 16s ease infinite;
  }

  @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
  }

  /* NAVBAR */
  .navbar {
      background: var(--brand-primary);
      color: #fff;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
  }
        .navbar .logo {
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }
.navbar nav a {
    display: inline-block;
    padding: 10px 18px;
    margin-left: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    text-decoration: none;
    transition: 0.25s ease;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
}

.navbar nav a:hover {
    background: #4a6cf7;
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
}

  @media (max-width: 700px) {
      .navbar {
          flex-direction: column;
          align-items: flex-start;
      }
      .navbar nav {
          margin-top: 10px;
          display: flex;
          flex-wrap: wrap;
          gap: 10px;
      }
  }

  /* CONTAINER */
  .container {
      max-width: 450px;
      margin: 60px auto;
      padding: 0 15px;
  }

  /* CARD (GLASS STYLE) */
  .card {
      background: rgba(255,255,255,0.06);
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
  }

  h1 {
      margin-top: 0;
      font-size: 26px;
      color: #fff;
      text-align: center;
  }

  /* FORM */
  label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: #ddd;
  }

  input {
      width: 94%;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid #555;
      background: rgba(0,0,0,0.25);
      color: #eee;
      margin-bottom: 15px;
      font-size: 14px;
  }
  input::placeholder {
      color: #888;
  }

  /* BUTTON */
  .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--brand-primary);
      color: #fff;
      border-radius: var(--radius);
      border: none;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
  }
  .btn-primary:hover {
      background: var(--brand-primary-dark);
  }

  /* HELPER TEXT */
  .helper {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
  }
  .helper a {
      color: #9fc7ff;
  }
  .helper a:hover {
      color: #cfe2ff;
  }

  /* ERRORS */
  .input-error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 10px;
  }

  /* FOOTER */
  footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #aaa;
      margin-top: 40px;
  }

    </style>
</head>
<body>

<header class="navbar">
    <div class="logo"><img th:src="@{/images/logo.png}" alt="Stockland" style="height:80px;vertical-align:middle;margin-top:-20px;margin-bottom:-20px;"></div>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<div class="container">
    <div class="card">
        <h1>Create Account</h1>

        <form th:action="@{/register}" th:object="${user}" method="post">


            <label>Full Name</label>
            <input type="text" th:field="*{fullName}" placeholder="Your name">
            <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="input-error"></p>

            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="you@example.com">
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="input-error"></p>

            <label>Username</label>
            <input type="text" th:field="*{username}" placeholder="username">
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="input-error"></p>

            <label>Phone Number <span style="font-weight:normal; color:#888;">(optional)</span></label>
            <input type="tel" th:field="*{phoneNumber}" placeholder="+371 20 000 000">
            <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="input-error"></p>

            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="••••••••">
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="input-error"></p>

            <button class="btn-primary" type="submit">Sign Up</button>

            <p th:if="${error}" th:text="${error}" style="color:red; text-align:center; margin-top:8px;"></p>
            <p th:if="${success}" th:text="${success}" style="color:green; text-align:center; margin-top:8px;"></p>

        </form>


        <div class="helper">
            Already have an account?
            <a th:href="@{/login}">Login</a>
        </div>
    </div>
</div>

<footer>
    STOCKLAND - Real Estate Property Listing & Management System
</footer>

<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
