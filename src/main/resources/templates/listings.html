<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Listing – STOCKLAND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

<style>:root {
    --brand-primary: #1f3c88;
    --brand-primary-dark: #162b5c;
    --brand-accent: #4a6cf7;
    --bg-light: #f5f5f5;
    --bg-white: #ffffff;
    --text-dark: #222;
    --text-light: #666;
    --radius: 8px;
    --shadow: 0 2px 6px rgba(0,0,0,0.08);
    --transition: 0.25s ease;
}

/* GLOBAL BACKGROUND */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #eee;

    background: linear-gradient(120deg,
        #141824,
        #1f2a3d,
        #263a55,
        #1c2740,
        #141824
    );
    background-size: 400% 400%;
    animation: gradientFlow 16s ease infinite;
}

@keyframes gradientFlow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* NAVBAR */
.navbar {
    background: var(--brand-primary);
    color: #fff;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar .logo {
    letter-spacing: 1px;
    display: flex;
    align-items: center;
}

/* NAVBAR BUTTON STYLE (APPLIES TO ALL LINKS INCLUDING LOGOUT) */
.navbar nav a,
.navbar form button {
    display: inline-block;
    padding: 10px 18px;
    margin-left: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    background: #4a6cf7; /* same blue as other buttons */
    border-radius: 10px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: 0.25s ease;
}

.navbar nav a:hover,
.navbar form button:hover {
    background: #6f8cff;
    transform: translateY(-2px);
}


/* CONTAINER */
.container {
    max-width: 1100px;
    margin: 25px auto;
    padding: 0 15px;
}

/* HERO FILTER BOX */
.hero {
    background: rgba(255,255,255,0.06);
    padding: 25px;
    border-radius: var(--radius);
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    margin-bottom: 25px;
    backdrop-filter: blur(6px);
}

.filter-box {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 25px;
}

.filter-sections label {
    font-size: 13px;
    color: #ccc;
}

.filter-sections input,
.filter-sections select {
    width: 100%;
    padding: 8px;
    border-radius: var(--radius);
    border: 1px solid #555;
    background: rgba(0,0,0,0.25);
    color: #eee;
}

.filter-box button {
    background: var(--brand-primary);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--transition);
}

.filter-box button:hover {
    background: var(--brand-primary-dark);
}

/* SECTION TITLE */
.section-title {
    margin: 20px 0 10px;
    font-size: 20px;
    color: #fff;
}

select {
    background: rgba(0,0,0,0.25);
    color: #eee;
    border: 1px solid #555;
}

select option {
    background: #ffffff !important;
    color: #222 !important;
}


.search-box select option {
    background: #ffffff !important;
    color: #222 !important;
}

/* CARDS GRID */
.cards {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 22px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    backdrop-filter: blur(4px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

/* CARD IMAGE */
.card-img img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
}

/* CARD BODY */
.card-body h3 {
    font-size: 18px;
    margin: 10px 0 6px;
    color: #fff;
}

.card-body p {
    margin: 4px 0;
    font-size: 13px;
    color: #ccc;
}

/* CARD FOOTER */
.card-footer {
    margin-top: 10px;
    text-align: right;
}

.card-footer a {
    background: var(--brand-accent);
    color: #fff;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    transition: 0.3s;
}

.card-footer a:hover {
    background: #6c85ff;
}

/* PAGINATION */
.pagination-container a {
    color: #fff;
    padding: 6px 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    transition: 0.3s;
}

.pagination-container a:hover {
    background: rgba(255,255,255,0.2);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    font-size: 13px;
    color: #aaa;
    margin-top: 40px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .card-img img {
        height: 130px;
    }
}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo"><img th:src="@{/images/logo.png}" alt="Stockland" style="height:80px;vertical-align:middle;margin-top:-20px;margin-bottom:-20px;"></div>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<div class="container">
    <section class="hero">
        <form th:action="@{/listings}" method="get" class="filter-box">
            <div class="filter-sections">
                <label>Location</label>
                <input type="text" name="location" placeholder="location" th:value="${filters.location}">
            </div>
            <div class="filter-sections">
                <label>Min. Price</label>
                <input type="number" name="minPrice" placeholder="min. price" th:value="${filters.minPrice}">
            </div>
            <div class="filter-sections">
                <label >Max. Price</label>
                <input type="number" name="maxPrice" placeholder="max. price" th:value="${filters.maxPrice}">
            </div>
            <div class="filter-sections">
                <label>Deal type</label>
                <select name="actionType">
                    <option value="">-</option>
                    <option th:each="a : ${actions}"
                            th:value="${a}"
                            th:text="${a}"
                            th:selected="${a == filters.actionType}">
                    </option>
                </select>
            </div>
            <div class="filter-sections">
                <label>Property type</label>
                <select name="propertyType">
                    <option value="">-</option>
                    <option th:each="p : ${propertyTypes}"
                            th:value="${p}"
                            th:text="${p}"
                            th:selected="${p == filters.propertyType}">
                    </option>
                </select>
            </div>
            <div class="filter-sections">
                <label>Status</label>
                <select name="status">
                    <option value="">-</option>
                    <option th:value="OLD" th:text="OLD" th:selected="${filters.status == 'OLD'}"></option>
                    <option th:value="NEW" th:text="NEW" th:selected="${filters.status == 'NEW'}"></option>
                </select>
            </div>
            <div class="filter-sections">
                <label>Min. Area</label>
                <input type="number" name="minArea" placeholder="min. area" th:value="${filters.minArea}">
            </div>
            <div class="filter-sections">
                <label >Max. Area</label>
                <input type="number" name="maxArea" placeholder="max. area" th:value="${filters.maxArea}">
            </div>
            <div class="filter-sections">
                <label>Min. Rooms</label>
                <input type="number" name="minRooms" placeholder="min. rooms" th:value="${filters.minRooms}">
            </div>
            <div class="filter-sections">
                <label >Max. Rooms</label>
                <input type="number" name="maxRooms" placeholder="max. rooms" th:value="${filters.maxRooms}">
            </div>
            <div class="filter-sections">
                <label>Sort</label>
                <select id="sort" name="sort">
                    <option value="">-</option>
                    <option value="price,asc">Price: Low to High</option>
                    <option value="price,desc">Price: High to Low</option>
                </select>
            </div>
            <button type="submit">Search</button>
        </form>
        <div class="sort-error-box">
            <div th:if="${errorMessage}">
                <span th:text="${errorMessage}"></span>
            </div>
        </div>
    </section>

    <h2 class="section-title">Searched listings</h2>

    <div class="cards">
        <article class="card" th:each="p : ${properties}">
            <div class="card-img">
                <img th:src="${p.images != null && p.images.length > 0 ? p.images[0] : '/images/placeholder_image.jpg'}"
                     alt="Property Preview"
                     style="width:100%; height:200px; object-fit:cover;">
            </div>
            <div class="card-body">
                <h3 th:text="${p.title}">Property title</h3>
                <p th:text="${p.location}">location</p>
                <p th:text="${p.propertyType}">Type</p>
                <p th:text="${p.actionType}">Action</p>
                <p style="white-space: nowrap;"><span th:text="${#numbers.formatDecimal(p.price, 1, 'WHITESPACE', 2, 'COMMA')}">0</span> €</p>
                <p th:text="${p.status}">status</p>
            </div>
            <div class="card-footer">
                <a th:href="@{/property/{id}(id=${p.id})}">View</a>
            </div>
        </article>

        <p th:if="${properties == null or properties.isEmpty()}">
            No listings found matching your search.
        </p>
    </div>

    <div class="pagination-container" th:if="${propertyPage.totalPages > 1}">
        <ul style="display: flex; list-style: none; gap: 10px;">

            <li th:if="${propertyPage.hasPrevious()}">
                <a th:href="@{/listings(page=${propertyPage.number - 1},
                location=${filters.location},
                minPrice=${filters.minPrice},
                maxPrice=${filters.maxPrice},
                actionType=${filters.actionType},
                propertyType=${filters.propertyType},
                maxArea=${filters.maxArea},
                minArea=${filters.minArea},
                maxRooms=${filters.maxRooms},
                minRooms=${filters.minRooms},
                status=${filters.status}
                )}">Previous</a>
            </li>

            <li th:each="i : ${#numbers.sequence(0, propertyPage.totalPages - 1)}">
                <a th:href="@{/listings(page=${i},
                location=${filters.location},
                minPrice=${filters.minPrice},
                maxPrice=${filters.maxPrice},
                actionType=${filters.actionType},
                propertyType=${filters.propertyType},
                maxArea=${filters.maxArea},
                minArea=${filters.minArea},
                maxRooms=${filters.maxRooms},
                minRooms=${filters.minRooms},
                status=${filters.status}
                )}"
                   th:text="${i + 1}"
                   th:style="${i == propertyPage.number} ? 'font-weight:bold; color:red;' : ''">1</a>
            </li>

            <li th:if="${propertyPage.hasNext()}">
                <a th:href="@{/listings(page=${propertyPage.number + 1},
                location=${filters.location},
                minPrice=${filters.minPrice},
                maxPrice=${filters.maxPrice},
                actionType=${filters.actionType},
                propertyType=${filters.propertyType},
                maxArea=${filters.maxArea},
                minArea=${filters.minArea},
                maxRooms=${filters.maxRooms},
                minRooms=${filters.minRooms},
                status=${filters.status}
                )}">Next</a>
            </li>
        </ul>
    </div>

</div>

<footer>
    STOCKLAND - Real Estate Property Listing & Management System
</footer>

<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
