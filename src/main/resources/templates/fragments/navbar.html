<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/listings}">Listings</a>

    <a th:href="@{/dashboard}"
       sec:authorize="hasRole('ADMIN')"
       style="color:#ffcccc;">
        Admin Dashboard
    </a>

    <a th:href="@{/dashboard}"
       sec:authorize="hasRole('USER')">
        Dashboard
    </a>

    <a th:href="@{/create-listing}"
       sec:authorize="isAuthenticated()">
        Post property
    </a>

    <a th:href="@{/login}"
       sec:authorize="!isAuthenticated()">
        Login
    </a>

    <a th:href="@{/register}"
       sec:authorize="!isAuthenticated()">
        Sign up
    </a>

    <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" style="display:inline;">
        <button type="submit" style="display:inline-block;padding:10px 18px;margin-left:12px;font-size:14px;font-weight:600;color:#ffffff;background:rgba(255,255,255,0.12);border:none;border-radius:10px;cursor:pointer;text-decoration:none;transition:0.25s ease;box-shadow:0 3px 10px rgba(0,0,0,0.25);"
                onmouseover="this.style.background='#4a6cf7';this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 16px rgba(0,0,0,0.35)';"
                onmouseout="this.style.background='rgba(255,255,255,0.12)';this.style.transform='';this.style.boxShadow='0 3px 10px rgba(0,0,0,0.25)';">Logout</button>
    </form>
</nav>

</body>
</html>
